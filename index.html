<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Logo</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0f;
    }

    .logo {
      width: min(90vw, 740px);
      height: auto;
    }

    .logo svg {
      display: block;
      width: 100%;
      height: auto;
    }
  </style>
</head>
<body>
  <div class="logo" aria-label="Logo">
    <svg width="1480" height="825" viewBox="0 0 1480 825" fill="none" xmlns="http://www.w3.org/2000/svg">
      <g id="logo">
        <rect width="1480" height="825" fill="white"/>
        <path id="tracciato" d="M977 554L740.5 648.5L504 554V176L740.5 270.5L977 176V554Z" stroke="black" stroke-width="12" stroke-linejoin="round"/>
        <path id="linea" d="M740 294.5V625" stroke="black" stroke-width="12"/>
        <g id="m">
          <g transform="translate(-503.5 -176.5)">
            <rect x="440" y="106" width="127" height="141" rx="10" fill="white"/>
            <path d="M471.811 192.33L470.25 150.245L497.552 223.739H508.81L536.176 150.203L534.614 192.33V223.739H550.488V129.251H529.807L503.244 202.129L476.618 129.251H456V223.739H471.811V192.33Z" fill="black"/>
          </g>
        </g>
        <g id="t">
          <g transform="translate(-977 -554.5)">
            <rect x="923" y="484" width="108" height="141" rx="10" fill="white"/>
            <path fill-rule="evenodd" clip-rule="evenodd" d="M968.479 520.073H939.081V507.094H1014.3V520.073H984.638V601.582H968.479V520.073Z" fill="black"/>
          </g>
        </g>
      </g>
    </svg>
  </div>

  <script type="importmap">
  {
    "imports": {
      "animejs": "https://cdn.jsdelivr.net/npm/animejs@4.4.1/dist/modules/index.js",
      "animejs/svg": "https://cdn.jsdelivr.net/npm/animejs@4.4.1/dist/modules/svg/index.js"
    }
  }
  </script>
  <script type="module">
    const path = document.getElementById('tracciato');
    const pathLength = path.getTotalLength();

    const INITIAL_DELAY_MS = 700;
    const PAUSE_MS = 500;
    const MOVE_MS = 2200;
    const SPEED = pathLength / MOVE_MS;

    const letters = {
      m: document.getElementById('m'),
      t: document.getElementById('t'),
    };

    const corners = [
      { x: 977, y: 554 },
      { x: 740.5, y: 648.5 },
      { x: 504, y: 554 },
      { x: 504, y: 176 },
      { x: 740.5, y: 270.5 },
      { x: 977, y: 176 },
    ];

    function pathOffsetAt(x, y) {
      let best = 0;
      let bestDist = Infinity;

      for (let i = 0; i <= 500; i++) {
        const t = (i / 500) * pathLength;
        const p = path.getPointAtLength(t);
        const dist = (p.x - x) ** 2 + (p.y - y) ** 2;
        if (dist < bestDist) {
          bestDist = dist;
          best = t / pathLength;
        }
      }

      return best;
    }

    function normalizeOffset(offset) {
      return ((offset % 1) + 1) % 1;
    }

    function offsetDistance(from, to, forward) {
      if (forward) {
        return to >= from ? to - from : 1 - from + to;
      }
      return to <= from ? from - to : from + (1 - to);
    }

    function interpolateOffset(from, to, forward, progress) {
      if (forward) {
        const end = to >= from ? to : to + 1;
        return normalizeOffset(from + (end - from) * progress);
      }
      const end = to <= from ? to : to - 1;
      return normalizeOffset(from + (end - from) * progress);
    }

    function placeOnPath(letter, offset) {
      const point = path.getPointAtLength(normalizeOffset(offset) * pathLength);
      letters[letter].setAttribute('transform', `translate(${point.x} ${point.y})`);
    }

    function segmentDistance(fromOffset, toOffset, forward) {
      return offsetDistance(fromOffset, toOffset, forward) * pathLength;
    }

    function easeInOut(t) {
      return t < 0.5 ? 4 * t * t * t : 1 - (-2 * t + 2) ** 3 / 2;
    }

    function animateSegment(letter, fromOffset, toOffset, forward, duration) {
      return new Promise((resolve) => {
        if (duration <= 0) {
          placeOnPath(letter, toOffset);
          resolve();
          return;
        }

        const startTime = performance.now();

        function frame(now) {
          const t = Math.min((now - startTime) / duration, 1);
          const offset = interpolateOffset(fromOffset, toOffset, forward, easeInOut(t));
          placeOnPath(letter, offset);

          if (t < 1) {
            requestAnimationFrame(frame);
          } else {
            resolve();
          }
        }

        requestAnimationFrame(frame);
      });
    }

    function wait(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    const cornerOffsets = corners.map((corner) => pathOffsetAt(corner.x, corner.y));
    const sortedCorners = [...cornerOffsets].sort((a, b) => a - b);
    const mStart = pathOffsetAt(503.5, 176.5);

    function closestCornerIndex(offset) {
      return sortedCorners.reduce(
        (best, cornerOffset, index) =>
          Math.abs(cornerOffset - offset) < Math.abs(sortedCorners[best] - offset) ? index : best,
        0,
      );
    }

    function oppositeOffset(offset) {
      const index = closestCornerIndex(offset);
      return sortedCorners[(index + 3) % sortedCorners.length];
    }

    function buildSteps(startOffset, forward) {
      const startIndex = closestCornerIndex(startOffset);
      const ordered = Array.from({ length: sortedCorners.length }, (_, i) => {
        const index = forward
          ? (startIndex + i) % sortedCorners.length
          : (startIndex - i + sortedCorners.length) % sortedCorners.length;
        return sortedCorners[index];
      });
      const targets = [...ordered.slice(1), ordered[0]];

      return ordered.map((from, i) => ({ from, to: targets[i], forward }));
    }

    function buildOppositeStep(mStep) {
      return {
        from: oppositeOffset(mStep.from),
        to: oppositeOffset(mStep.to),
        forward: mStep.forward,
      };
    }

    async function runLoop() {
      await wait(INITIAL_DELAY_MS);

      let forward = true;

      while (true) {
        const mSteps = buildSteps(mStart, forward);

        for (let i = 0; i < mSteps.length; i++) {
          const mStep = mSteps[i];
          const tStep = buildOppositeStep(mStep);
          const mDistance = segmentDistance(mStep.from, mStep.to, mStep.forward);
          const tDistance = segmentDistance(tStep.from, tStep.to, tStep.forward);
          const duration = Math.max(mDistance, tDistance) / SPEED;

          await Promise.all([
            animateSegment('m', mStep.from, mStep.to, mStep.forward, duration),
            animateSegment('t', tStep.from, tStep.to, tStep.forward, duration),
          ]);

          await wait(PAUSE_MS);
        }

        forward = !forward;
      }
    }

    placeOnPath('m', mStart);
    placeOnPath('t', oppositeOffset(mStart));
    runLoop();
  </script>
</body>
</html>
